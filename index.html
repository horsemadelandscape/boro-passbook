<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>ボロ通帳</title>
<style>
:root{
  --green:#1D9E75;--green-d:#0F6E56;--green-l:#E1F5EE;
  --red:#D85A30;--red-d:#993C1D;--red-l:#FAECE7;
  --purple-l:#EEEDFE;--purple:#3C3489;
  --amber:#BA7517;--amber-l:#FAEEDA;
  --text:#1a1a1a;--text2:#666;--text3:#aaa;
  --bg:#f5f5f3;--card:#fff;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.07);
  --r:14px;--rs:10px;
}
@media(prefers-color-scheme:dark){:root{
  --text:#f0f0f0;--text2:#999;--text3:#555;
  --bg:#111;--card:#1e1e1e;
  --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.07);
  --green-l:#0a3d2e;--red-l:#3d1a0a;--purple-l:#1e1b3a;--purple:#9b8ff0;
  --amber-l:#2a1e00;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg)}
body{font-family:-apple-system,"Helvetica Neue",sans-serif;color:var(--text);font-size:16px;overscroll-behavior:none}
input,textarea,button{font-family:inherit;font-size:16px}
.screen{display:none;flex-direction:column;height:100vh;max-width:480px;margin:0 auto}
.screen.active{display:flex}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--card);border-bottom:0.5px solid var(--border);flex-shrink:0}
.body{flex:1;overflow-y:auto;padding:20px 16px;-webkit-overflow-scrolling:touch}
.btn{display:flex;align-items:center;justify-content:center;padding:15px 20px;border:1px solid var(--border);border-radius:var(--rs);background:var(--card);color:var(--text);font-size:16px;font-weight:500;cursor:pointer;width:100%;margin-bottom:10px;transition:opacity .15s}
.btn:active{opacity:.7;transform:scale(.98)}
.btn-green{background:var(--green);border-color:var(--green-d);color:#fff}
.btn-red{background:var(--red);border-color:var(--red-d);color:#fff}
.btn-outline-red{background:transparent;border-color:var(--red);color:var(--red)}
.btn-ghost{border-color:transparent;background:transparent;color:var(--text2);width:auto;padding:8px 4px;margin:0;font-size:14px}
.btn-sm{width:auto;padding:9px 16px;font-size:14px;margin:0}
.card{background:var(--card);border-radius:var(--r);padding:18px;margin-bottom:14px;border:0.5px solid var(--border2)}
.form-field{margin-bottom:16px}
.form-field label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500}
.form-field input,.form-field textarea{width:100%;padding:14px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg);color:var(--text);font-size:16px;-webkit-appearance:none}
.form-field input:focus,.form-field textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(29,158,117,.15)}
.form-field textarea{resize:none;height:80px}
.error{color:var(--red);font-size:13px;margin-bottom:10px}
.sec-hd{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-admin{background:var(--purple-l);color:var(--purple)}
.badge-sync{background:var(--amber-l);color:var(--amber);font-size:11px;padding:2px 8px}
.avatar{width:44px;height:44px;border-radius:50%;background:var(--green-l);color:var(--green-d);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.balance-hero{text-align:center;padding:36px 16px 28px}
.balance-label{font-size:14px;color:var(--text2);margin-bottom:8px}
.balance-num{font-size:64px;font-weight:800;color:var(--green);line-height:1;letter-spacing:-3px}
.balance-unit{font-size:20px;color:var(--green);margin-top:6px}
.txn-item{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 0;border-bottom:0.5px solid var(--border2);gap:12px}
.txn-item:last-child{border-bottom:none}
.txn-date{font-size:12px;color:var(--text2);margin-bottom:2px}
.txn-note{font-size:13px;color:var(--text);word-break:break-word}
.txn-right{text-align:right;flex-shrink:0}
.txn-amt{font-size:18px;font-weight:700}
.txn-bal{font-size:12px;color:var(--text3);margin-top:2px}
.plus{color:var(--green)}.minus{color:var(--red)}
.member-item{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:0.5px solid var(--border2)}
.member-item:last-child{border-bottom:none}
.member-info{flex:1;min-width:0}
.member-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.member-email{font-size:12px;color:var(--text2);margin:2px 0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.member-bal{font-size:20px;font-weight:700;color:var(--green);white-space:nowrap;text-align:right}
.member-bal small{font-size:13px;font-weight:500;margin-left:2px}
.member-acts{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
.tab-bar{display:flex;border-top:0.5px solid var(--border);background:var(--card);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 12px;border:none;background:transparent;color:var(--text2);font-size:11px;font-weight:500;cursor:pointer;gap:3px}
.tab-btn.active{color:var(--green)}
.tab-icon{font-size:24px;line-height:1}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500}
.overlay.open{display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--card);border-radius:20px 20px 0 0;padding:0 20px calc(36px + env(safe-area-inset-bottom,0));width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:14px auto 20px}
.sheet-title{font-size:17px;font-weight:700;margin-bottom:20px}
.sheet-btns{display:flex;gap:10px}
.sheet-btns .btn{margin:0}
.toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0));left:50%;transform:translateX(-50%) translateY(20px);background:#222;color:#fff;padding:12px 20px;border-radius:30px;font-size:14px;font-weight:500;white-space:nowrap;opacity:0;transition:all .25s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.confirm-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:800;align-items:center;justify-content:center;padding:20px}
.confirm-bg.open{display:flex}
.confirm-box{background:var(--card);border-radius:var(--r);padding:24px 20px;width:100%;max-width:340px}
.confirm-box h3{font-size:17px;font-weight:700;margin-bottom:10px}
.confirm-box p{font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.6}
.confirm-btns{display:flex;gap:10px}
.confirm-btns .btn{margin:0}
.cred-box{background:var(--bg);border-radius:var(--rs);padding:14px;margin:14px 0;font-size:14px;line-height:2;border:1px solid var(--border)}
#s-login .body{display:flex;flex-direction:column;justify-content:center;padding:32px 20px}
.logo-mark{text-align:center;margin-bottom:36px}
.logo-boro{font-size:52px;font-weight:800;color:var(--green);letter-spacing:-2px}
.logo-sub{font-size:14px;color:var(--text2);margin-top:4px}
.profile-row{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.profile-name{font-size:18px;font-weight:700}
.profile-email{font-size:13px;color:var(--text2);margin-top:2px}
.empty{text-align:center;color:var(--text3);padding:40px 20px;font-size:14px}
.loading{text-align:center;color:var(--text2);padding:40px 20px;font-size:14px}
.setup-banner{background:var(--amber-l);border:1px solid var(--amber);border-radius:var(--rs);padding:14px;margin-bottom:14px;font-size:13px;color:var(--amber);line-height:1.6}
</style>
</head>
<body>
<!-- Firebase SDK v8 via jsDelivr -->
<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-app.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-database.min.js"></script>
<div class="screen active" id="s-login">
  <div class="body">
    <div class="logo-mark">
      <div class="logo-boro">ボロ</div>
      <div class="logo-sub">農園通貨 通帳システム</div>
    </div>
    <div id="config-banner" class="setup-banner" style="display:none">

</div>
<div class="screen" id="s-user">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:8px">
      <div id="u-topname" style="font-size:16px;font-weight:700"></div>
      <span class="badge badge-sync" id="u-sync-badge" style="display:none">同期中</span>
    </div>
    <button class="btn btn-ghost" onclick="showUserTab('profile')">アカウント</button>
  </div>
  <div id="u-tab-home" class="body">
    <div class="balance-hero">

    </div>
    <div class="card">

  </div>
  <div id="u-tab-profile" class="body" style="display:none">
    <div class="card">
      <div class="sec-hd">アカウント情報</div>
      <div class="profile-row">
        <div class="avatar" id="u-avatar"></div>
        <div><div class="profile-name" id="u-pname"></div><div class="profile-email" id="u-pemail"></div></div>

    <div class="card">

    <div class="card">

  <div class="tab-bar">

    <button class="tab-btn" id="utab-profile" onclick="showUserTab('profile')">
      <span class="tab-icon">👤</span>アカウント

</div>
<div class="screen" id="s-admin">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:8px">
      <span class="badge badge-admin">管理者</span>
      <span class="badge badge-sync" id="a-sync-badge" style="display:none">処理中</span>
    </div>
    <button class="btn btn-ghost" onclick="doLogout()">ログアウト</button>
  </div>
  <div id="a-tab-members" class="body">
    <div class="sec-hd" id="a-count-hd">会員一覧</div>
    <div class="card" style="padding:4px 18px"><div id="member-list"><div class="loading">読み込み中...</div></div></div>

      <div class="form-field"><label>メールアドレス</label><input type="email" id="n-email" placeholder="hanako@example.com" inputmode="email"/></div>
      <div class="form-field"><label>初期パスワード</label><input type="text" id="n-pass" placeholder="例: pass1234" autocomplete="off"/></div>
      <div class="form-field"><label>初期ボロ残高</label><input type="number" id="n-bal" value="0" inputmode="numeric"/></div>

</div>
<div class="overlay" id="txn-overlay" onclick="if(event.target===this)closeTxnSheet()">
  <div class="sheet">

    <div class="sheet-title" id="sh-title"></div>
    <div class="form-field">

    </div>

      <input type="number" id="sh-amount" min="1" inputmode="numeric" placeholder="例: 100"/>

    </div>
    <div id="sh-err" class="error" style="display:none"></div>
    <div class="sheet-btns">
      <button class="btn" style="flex:0 0 90px" onclick="closeTxnSheet()">キャンセル</button>
      <button class="btn btn-green" id="sh-exec" style="flex:1" onclick="doTransaction()">実行する</button>
    </div>
  </div>
</div>
<div class="overlay" id="mail-overlay" onclick="if(event.target===this)closeMailSheet()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">登録完了メールを送る</div>
    <p style="font-size:14px;color:var(--text2);margin-bottom:14px;line-height:1.6">以下の内容でメールアプリが開きます。確認・送信してください。</p>
    <div class="cred-box" id="mail-preview"></div>
    <div id="mail-mailto" style="margin-bottom:10px"></div>
    <button class="btn" onclick="closeMailSheet()">閉じる</button>

</div>
<div class="overlay" id="del-overlay" onclick="if(event.target===this)closeDelSheet()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">会員を削除</div>
    <p style="font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.6" id="del-msg"></p>
    <div class="sheet-btns">
      <button class="btn" style="flex:1" onclick="closeDelSheet()">キャンセル</button>
      <button class="btn btn-red" style="flex:1" onclick="execDeleteMember()">削除する</button>

</div>
<div class="confirm-bg" id="confirm-bg">
  <div class="confirm-box">
    <h3>アカウントを削除しますか？</h3>
    <p>残高・履歴はすべて失われます。この操作は取り消せません。</p>
    <div class="confirm-btns">
      <button class="btn" style="flex:1" onclick="closeConfirm()">キャンセル</button>
      <button class="btn btn-red" style="flex:1" onclick="execDeleteAccount()">削除する</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
// ============================================================
// ↓↓↓  ここを自分のFirebase設定値に書き換えてください  ↓↓↓
// Firebase Console > プロジェクト設定 > アプリを追加 > Web
// で取得できる設定値を以下に貼り付けてください
// ============================================================
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyBWH4iQo3R91RZrU6TuDF99wfZVuVWeTvc",
  authDomain:        "boro-passbook.firebaseapp.com",
  databaseURL:       "https://boro-passbook-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "boro-passbook",
  storageBucket:     "boro-passbook.firebasestorage.app",
  messagingSenderId: "403077095248",
  appId:             "1:403077095248:web:e8f64b4f4d88f333c69655",
  measurementId:     "G-82WN4XVHRX"
};
// ============================================================
// ↑↑↑  設定は上記まで  ↑↑↑
// ============================================================

// 管理者のメールアドレス（初回起動時に自動作成）
const ADMIN_EMAIL = "admin@farm.com";
const ADMIN_PASSWORD = "admin1234";

// アプリ層変数
let db = null;
let currentEmail = null;
let txnModal = null;
let delTarget = null;
let userListener = null;
let txnListener = null;
let membersListener = null;

function encodeKey(email){
  return email.replace(/\./g,"_DOT_").replace(/@/g,"_AT_");
}
function decodeKey(key){
  return key.replace(/_DOT_/g,".").replace(/_AT_/g,"@");
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function today(){const d=new Date();return d.getFullYear()+"/"+(d.getMonth()+1).toString().padStart(2,"0")+"/"+d.getDate().toString().padStart(2,"0")}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function initials(n){const p=n.trim().split(/\s+/);return p.length>=2?p[0][0]+p[1][0]:n.slice(0,2)}

function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2400);
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function initFirebase(){
  const isPlaceholder = FIREBASE_CONFIG.apiKey === "YOUR_API_KEY";
  if(isPlaceholder){
    document.getElementById("config-banner").style.display="block";
    document.getElementById("l-btn").disabled=true;
    document.getElementById("l-btn").textContent="設定が必要です";
    return false;
  }
  try{
    if(!firebase.apps.length){firebase.initializeApp(FIREBASE_CONFIG);}
    db=firebase.database();
    return true;
  }catch(e){
    console.error("Firebase init error",e);
    document.getElementById("l-err").style.display="block";
    document.getElementById("l-err").textContent="Firebaseの初期化に失敗しました: "+e.message;
    return false;
  }
}

async function ensureAdminExists(){
  const key=encodeKey(ADMIN_EMAIL);
  const snap=await db.ref("users/"+key).once("value");
  if(!snap.exists()){
    await db.ref("users/"+key).set({name:"管理者",password:ADMIN_PASSWORD,balance:0,isAdmin:true});
  }
}

async function doLogin(){
  if(!db)return;
  const email=(document.getElementById("l-email").value||"").trim().toLowerCase();
  const pass=document.getElementById("l-pass").value||"";
  const errEl=document.getElementById("l-err");
  const btn=document.getElementById("l-btn");
  errEl.style.display="none";
  btn.textContent="確認中...";btn.disabled=true;
  try{
    const key=encodeKey(email);
    const snap=await db.ref("users/"+key).once("value");
    const u=snap.val();
    if(!u||u.password!==pass){
      errEl.style.display="block";
      errEl.textContent="メールアドレスまたはパスワードが正しくありません";
      return;
    }
    currentEmail=email;
    if(u.isAdmin)showAdmin();
    else showUser(email,u);
  }catch(e){
    errEl.style.display="block";
    errEl.textContent="ネットワークエラー: "+e.message;
  }finally{
    btn.textContent="ログイン";btn.disabled=false;
  }
}
document.getElementById("l-pass").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});

function doLogout(){
  // リアルタイムリスナーを解除
  if(userListener){userListener();userListener=null;}
  if(txnListener){txnListener();txnListener=null;}
  if(membersListener){membersListener();membersListener=null;}
  currentEmail=null;
  document.getElementById("l-email").value="";
  document.getElementById("l-pass").value="";
  document.getElementById("l-err").style.display="none";
  showScreen("s-login");
}

function showUser(email,userData){
  document.getElementById("u-topname").textContent=userData.name;
  document.getElementById("u-avatar").textContent=initials(userData.name);
  document.getElementById("u-pname").textContent=userData.name;
  document.getElementById("u-pemail").textContent=email;
  document.getElementById("u-balance").textContent=userData.balance.toLocaleString();
  showUserTab("home");
  showScreen("s-user");
  // リアルタイムリスナー: 残高変化を自動反映
  if(userListener){userListener();}
  const key=encodeKey(email);
  userListener=db.ref("users/"+key).on("value",snap=>{
    const u=snap.val();
    if(u){document.getElementById("u-balance").textContent=u.balance.toLocaleString();}
  });
  // 履歴のリアルタイムリスナー
  if(txnListener){txnListener();}
  txnListener=db.ref("transactions/"+key).orderByKey().on("value",snap=>{
    const txns=[];
    snap.forEach(c=>{txns.push(c.val());});
    renderUserTxns(txns);
  });
}

function renderUserTxns(txns){
  const el=document.getElementById("u-txns");
  if(!txns.length){el.innerHTML='<div class="empty">履歴がありません</div>';return;}
  el.innerHTML=[...txns].reverse().map(t=>`
    <div class="txn-item">
      <div style="flex:1;min-width:0">
        <div class="txn-date">${esc(t.date)}</div>
        ${t.note?`<div class="txn-note">${esc(t.note)}</div>`:""}
      </div>
      <div class="txn-right">
        <div class="txn-amt ${t.amount>=0?"plus":"minus"}">${t.amount>=0?"+":""}${t.amount.toLocaleString()}</div>
        <div class="txn-bal">${t.balance.toLocaleString()} ボロ</div>
      </div>
    </div>`).join("");
}

function showUserTab(tab){
  const isHome=tab==="home";
  document.getElementById("u-tab-home").style.display=isHome?"block":"none";
  document.getElementById("u-tab-profile").style.display=isHome?"none":"block";
  document.getElementById("utab-home").classList.toggle("active",isHome);
  document.getElementById("utab-profile").classList.toggle("active",!isHome);
}

function showAdmin(){
  showAdminTab("members");
  showScreen("s-admin");
  // 会員一覧のリアルタイムリスナー
  if(membersListener){membersListener();}
  membersListener=db.ref("users").on("value",snap=>{
    const members=[];
    snap.forEach(c=>{
      const email=decodeKey(c.key);
      if(email!==ADMIN_EMAIL)members.push({email,data:c.val()});
    });
    renderMemberList(members);
  });
}

function renderMemberList(members){
  document.getElementById("a-count-hd").textContent=`会員一覧（${members.length}名）`;
  const el=document.getElementById("member-list");
  if(!members.length){el.innerHTML='<div class="empty">会員がいません</div>';return;}
  el.innerHTML=members.map(({email,data:u})=>`
    <div class="member-item">
      <div class="avatar">${initials(u.name)}</div>
      <div class="member-info">
        <div class="member-name">${esc(u.name)}</div>
        <div class="member-email">${esc(email)}</div>
        <div class="member-acts">
          <button class="btn btn-sm btn-green" onclick="openTxnSheet('pay',this.dataset.e,this.dataset.n)" data-e="${email.replace(/'/g,'\'')}" data-n="${u.name.replace(/'/g,'\'')}">支払い</button>
          <button class="btn btn-sm btn-outline-red" style="border-width:1px" onclick="openTxnSheet('recv',this.dataset.e,this.dataset.n)" data-e="${email.replace(/'/g,'\'')}" data-n="${u.name.replace(/'/g,'\'')}">受取り</button>
          <button class="btn btn-sm" style="color:var(--text3);font-size:12px" onclick="openDelSheet(this.dataset.e,this.dataset.n)" data-e="${email.replace(/'/g,'\'')}" data-n="${u.name.replace(/'/g,'\'')}">削除</button>
        </div>
      </div>
      <div><div class="member-bal">${u.balance.toLocaleString()}<small>ボロ</small></div></div>
    </div>`).join("");
}

function showAdminTab(tab){
  const isM=tab==="members";
  document.getElementById("a-tab-members").style.display=isM?"block":"none";
  document.getElementById("a-tab-add").style.display=isM?"none":"block";
  document.getElementById("atab-m").classList.toggle("active",isM);
  document.getElementById("atab-a").classList.toggle("active",!isM);
}

function openTxnSheet(type,email,name){
  const key=encodeKey(email);
  db.ref("users/"+key+"/balance").once("value").then(snap=>{
    const bal=snap.val()||0;
    txnModal={type,email,name,currentBal:bal};
    const isPay=type==="pay";
    document.getElementById("sh-title").textContent=isPay?`${name} さんへ支払い`:`${name} さんから受取り`;
    document.getElementById("sh-curbal").textContent=bal.toLocaleString()+" ボロ";
    document.getElementById("sh-amt-label").textContent=isPay?"支払うボロ数":"受け取るボロ数";
    const execBtn=document.getElementById("sh-exec");
    execBtn.className="btn "+(isPay?"btn-green":"btn-red");
    execBtn.style.flex="1";
    document.getElementById("sh-amount").value="";
    document.getElementById("sh-note").value="";
    document.getElementById("sh-err").style.display="none";
    document.getElementById("txn-overlay").classList.add("open");
    setTimeout(()=>document.getElementById("sh-amount").focus(),100);
  });
}
function closeTxnSheet(){document.getElementById("txn-overlay").classList.remove("open");txnModal=null;}

async function doTransaction(){
  const m=txnModal;
  const amtRaw=document.getElementById("sh-amount").value;
  const note=document.getElementById("sh-note").value.trim();
  const errEl=document.getElementById("sh-err");
  const amt=parseInt(amtRaw);
  if(!amtRaw||isNaN(amt)||amt<=0){
    errEl.style.display="block";errEl.textContent="1以上の数値を入力してください";return;
  }
  const badge=document.getElementById("a-sync-badge");
  badge.style.display="inline-flex";
  const execBtn=document.getElementById("sh-exec");
  execBtn.disabled=true;execBtn.textContent="処理中...";
  try{
    const key=encodeKey(m.email);
    // 最新残高を取得して原子的に更新
    const snap=await db.ref("users/"+key+"/balance").once("value");
    const currentBal=snap.val()||0;
    const delta=m.type==="pay"?amt:-amt;
    const newBal=currentBal+delta;
    if(newBal<0){
      errEl.style.display="block";errEl.textContent=`残高不足（現在: ${currentBal} ボロ）`;return;
    }
    const txnKey=Date.now().toString();
    await db.ref("users/"+key+"/balance").set(newBal);
    await db.ref("transactions/"+key+"/"+txnKey).set({
      date:today(),amount:delta,note:note,balance:newBal
    });
    closeTxnSheet();
    toast(m.type==="pay"?`${m.name}さんへ ${amt}ボロ 支払いました`:`${m.name}さんから ${amt}ボロ 受け取りました`);
  }catch(e){
    errEl.style.display="block";errEl.textContent="エラー: "+e.message;
  }finally{
    badge.style.display="none";
    execBtn.disabled=false;execBtn.textContent="実行する";
  }
}

async function doAddMember(){
  const name=document.getElementById("n-name").value.trim();
  const email=document.getElementById("n-email").value.trim().toLowerCase();
  const pass=document.getElementById("n-pass").value.trim();
  const bal=parseInt(document.getElementById("n-bal").value)||0;
  const errEl=document.getElementById("a-add-err");
  errEl.style.display="none";
  if(!name||!email||!pass){errEl.style.display="block";errEl.textContent="氏名・メール・パスワードは必須です";return;}
  if(!/^[^@]+@[^@]+\.[^@]+$/.test(email)){errEl.style.display="block";errEl.textContent="有効なメールアドレスを入力してください";return;}
  const badge=document.getElementById("a-sync-badge");
  badge.style.display="inline-flex";
  try{
    const key=encodeKey(email);
    const existing=await db.ref("users/"+key).once("value");
    if(existing.exists()){errEl.style.display="block";errEl.textContent="そのメールアドレスは既に登録されています";return;}
    const countSnap=await db.ref("users").once("value");
    let count=0;countSnap.forEach(c=>{if(decodeKey(c.key)!==ADMIN_EMAIL)count++;});
    if(count>=30){errEl.style.display="block";errEl.textContent="会員数の上限（30名）に達しています";return;}
    await db.ref("users/"+key).set({name,password:pass,balance:bal,isAdmin:false});
    if(bal>0){
      await db.ref("transactions/"+key+"/"+Date.now().toString()).set({
        date:today(),amount:bal,note:"初期残高",balance:bal
      });
    }
    ["n-name","n-email","n-pass"].forEach(id=>document.getElementById(id).value="");
    document.getElementById("n-bal").value="0";
    openMailSheet(name,email,pass,bal);
  }catch(e){
    errEl.style.display="block";errEl.textContent="エラー: "+e.message;
  }finally{
    badge.style.display="none";
  }
}

function openMailSheet(name,email,pass,bal){

  const body=`こんにちは、${name}さん。

農園通貨「ボロ」の通帳システムへ登録されました。
以下の情報でログインしてください。

---
メールアドレス: ${email}
パスワード: ${pass}
初期残高: ${bal}ボロ
---

ログイン後、パスワードの変更をお將めします。
どうぞよろしくお願いいたします。`;
  const mailtoLink=`mailto:${encodeURIComponent(email)}?subject=${subject}&body=${encodeURIComponent(body)}`;
  // fs=1 で作成画面をフルスクリーンで開く（必須）
  const gmailLink=`https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(email)}&su=${subject}&body=${encodeURIComponent(body)}`;

  document.getElementById("mail-preview").innerHTML=
    `<strong>宛先:</strong> ${esc(email)}<br><strong>氏名:</strong> ${esc(name)}<br><strong>パスワード:</strong> ${esc(pass)}<br><strong>初期残高:</strong> ${bal}ボロ`;
  document.getElementById("mail-mailto").innerHTML=
    `<p style="font-size:12px;color:var(--text2);margin-bottom:10px">※ Gmailアプリボタンを押してもメール画面が開かない場合は「ブラウザのGmail」をお試しください。</p>
     <a href="${gmailAppLink}" style="display:flex;align-items:center;justify-content:center;padding:15px 20px;background:#EA4335;color:#fff;border-radius:var(--rs);font-size:15px;font-weight:500;text-decoration:none;margin-bottom:10px">📱 Gmailアプリで送る（スマホ）</a>
     <a href="${gmailLink}" target="_blank" style="display:flex;align-items:center;justify-content:center;padding:15px 20px;background:#c0392b;color:#fff;border-radius:var(--rs);font-size:15px;font-weight:500;text-decoration:none;margin-bottom:10px">🌐 ブラウザのGmailで送る</a>
     <a href="${mailtoLink}" style="display:flex;align-items:center;justify-content:center;padding:15px 20px;background:var(--card);color:var(--text2);border:1px solid var(--border);border-radius:var(--rs);font-size:14px;font-weight:500;text-decoration:none">📧 デフォルトのメールアプリで送る</a>`;
  document.getElementById("mail-overlay").classList.add("open");
  showAdminTab("members");
}
function closeMailSheet(){document.getElementById("mail-overlay").classList.remove("open");}

function openDelSheet(email,name){
  delTarget={email,name};
  document.getElementById("del-msg").textContent=
    `${name}さん（${email}）のアカウントを削除します。残高・履歴はすべて失われます。この操作は取り消せません。`;
  document.getElementById("del-overlay").classList.add("open");
}
function closeDelSheet(){document.getElementById("del-overlay").classList.remove("open");delTarget=null;}
async function execDeleteMember(){
  if(!delTarget)return;
  const {email,name}=delTarget;
  const key=encodeKey(email);
  try{
    await db.ref("users/"+key).remove();
    await db.ref("transactions/"+key).remove();
    closeDelSheet();
    toast(`${name}さんのアカウントを削除しました`);
  }catch(e){toast("削除エラー: "+e.message);}
}

async function doChangePassword(){
  const current=document.getElementById("pw-current").value;
  const newPw=document.getElementById("pw-new").value;
  const confirm=document.getElementById("pw-confirm").value;
  const errEl=document.getElementById("pw-err");
  errEl.style.display="none";
  if(!current||!newPw||!confirm){
    errEl.style.display="block";errEl.textContent="すべての項目を入力してください";return;
  }
  if(newPw.length<6){
    errEl.style.display="block";errEl.textContent="新しいパスワードは6文字以上にしてください";return;
  }
  if(newPw!==confirm){
    errEl.style.display="block";errEl.textContent="新しいパスワードが一致しません";return;
  }
  const key=encodeKey(currentEmail);
  const snap=await db.ref("users/"+key+"/password").once("value");

(async()=>{
  const ok=initFirebase();
