<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>ボロ通帳</title>
<style>
:root{--green:#1D9E75;--green-d:#0F6E56;--green-l:#E1F5EE;--red:#D85A30;--red-d:#993C1D;--red-l:#FAECE7;--purple-l:#EEEDFE;--purple:#3C3489;--amber:#BA7517;--amber-l:#FAEEDA;--text:#1a1a1a;--text2:#666;--text3:#aaa;--bg:#f5f5f3;--card:#fff;--border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.07);--r:14px;--rs:10px;}
@media(prefers-color-scheme:dark){:root{--text:#f0f0f0;--text2:#999;--text3:#555;--bg:#111;--card:#1e1e1e;--border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.07);--green-l:#0a3d2e;--red-l:#3d1a0a;--purple-l:#1e1b3a;--purple:#9b8ff0;--amber-l:#2a1e00;}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg)}
body{font-family:-apple-system,"Helvetica Neue",sans-serif;color:var(--text);font-size:16px;overscroll-behavior:none}
input,textarea,button{font-family:inherit;font-size:16px}
.screen{display:none;flex-direction:column;height:100vh;max-width:480px;margin:0 auto}
.screen.active{display:flex}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--card);border-bottom:0.5px solid var(--border);flex-shrink:0}
.body{flex:1;overflow-y:auto;padding:20px 16px;-webkit-overflow-scrolling:touch}
.btn{display:flex;align-items:center;justify-content:center;padding:15px 20px;border:1px solid var(--border);border-radius:var(--rs);background:var(--card);color:var(--text);font-size:16px;font-weight:500;cursor:pointer;width:100%;margin-bottom:10px;transition:opacity .15s}
.btn:active{opacity:.7;transform:scale(.98)}
.btn-green{background:var(--green);border-color:var(--green-d);color:#fff}
.btn-red{background:var(--red);border-color:var(--red-d);color:#fff}
.btn-outline-red{background:transparent;border-color:var(--red);color:var(--red)}
.btn-ghost{border-color:transparent;background:transparent;color:var(--text2);width:auto;padding:8px 4px;margin:0;font-size:14px}
.btn-sm{width:auto;padding:9px 16px;font-size:14px;margin:0}
.card{background:var(--card);border-radius:var(--r);padding:18px;margin-bottom:14px;border:0.5px solid var(--border2)}
.form-field{margin-bottom:16px}
.form-field label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500}
.form-field input,.form-field textarea{width:100%;padding:14px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg);color:var(--text);font-size:16px;-webkit-appearance:none}
.form-field input:focus,.form-field textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(29,158,117,.15)}
.form-field textarea{resize:none;height:80px}
.error{color:var(--red);font-size:13px;margin-bottom:10px}
.sec-hd{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-admin{background:var(--purple-l);color:var(--purple)}
.badge-sync{background:var(--amber-l);color:var(--amber);font-size:11px;padding:2px 8px}
.avatar{width:44px;height:44px;border-radius:50%;background:var(--green-l);color:var(--green-d);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.balance-hero{text-align:center;padding:36px 16px 28px}
.balance-label{font-size:14px;color:var(--text2);margin-bottom:8px}
.balance-num{font-size:64px;font-weight:800;color:var(--green);line-height:1;letter-spacing:-3px}
.balance-unit{font-size:20px;color:var(--green);margin-top:6px}
.txn-item{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 0;border-bottom:0.5px solid var(--border2);gap:12px}
.txn-item:last-child{border-bottom:none}
.txn-date{font-size:12px;color:var(--text2);margin-bottom:2px}
.txn-note{font-size:13px;color:var(--text);word-break:break-word}
.txn-right{text-align:right;flex-shrink:0}
.txn-amt{font-size:18px;font-weight:700}
.txn-bal{font-size:12px;color:var(--text3);margin-top:2px}
.plus{color:var(--green)}.minus{color:var(--red)}
.member-item{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:0.5px solid var(--border2)}
.member-item:last-child{border-bottom:none}
.member-info{flex:1;min-width:0}
.member-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.member-email{font-size:12px;color:var(--text2);margin:2px 0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.member-bal{font-size:20px;font-weight:700;color:var(--green);white-space:nowrap;text-align:right}
.member-bal small{font-size:13px;font-weight:500;margin-left:2px}
.member-acts{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
.tab-bar{display:flex;border-top:0.5px solid var(--border);background:var(--card);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 12px;border:none;background:transparent;color:var(--text2);font-size:11px;font-weight:500;cursor:pointer;gap:3px}
.tab-btn.active{color:var(--green)}
.tab-icon{font-size:24px;line-height:1}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500}
.overlay.open{display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--card);border-radius:20px 20px 0 0;padding:0 20px calc(36px + env(safe-area-inset-bottom,0));width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:14px auto 20px}
.sheet-title{font-size:17px;font-weight:700;margin-bottom:20px}
.sheet-btns{display:flex;gap:10px}
.sheet-btns .btn{margin:0}
.toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0));left:50%;transform:translateX(-50%) translateY(20px);background:#222;color:#fff;padding:12px 20px;border-radius:30px;font-size:14px;font-weight:500;white-space:nowrap;opacity:0;transition:all .25s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.confirm-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:800;align-items:center;justify-content:center;padding:20px}
.confirm-bg.open{display:flex}
.confirm-box{background:var(--card);border-radius:var(--r);padding:24px 20px;width:100%;max-width:340px}
.confirm-box h3{font-size:17px;font-weight:700;margin-bottom:10px}
.confirm-box p{font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.6}
.confirm-btns{display:flex;gap:10px}
.confirm-btns .btn{margin:0}
.cred-box{background:var(--bg);border-radius:var(--rs);padding:14px;margin:14px 0;font-size:14px;line-height:2;border:1px solid var(--border)}
#s-login .body{display:flex;flex-direction:column;justify-content:center;padding:32px 20px}
.logo-boro{font-size:52px;font-weight:800;color:var(--green);letter-spacing:-2px;text-align:center}
.logo-sub{font-size:14px;color:var(--text2);margin-top:4px;text-align:center;margin-bottom:36px}
.profile-row{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.profile-name{font-size:18px;font-weight:700}
.profile-email{font-size:13px;color:var(--text2);margin-top:2px}
.empty{text-align:center;color:var(--text3);padding:40px 20px;font-size:14px}
.loading{text-align:center;color:var(--text2);padding:40px 20px;font-size:14px}
</style>
</head>
<body>
<div class="screen active" id="s-login"><div class="body">
  <div class="logo-boro">ボロ</div>
  <div class="logo-sub">農園通貨 通帳システム</div>
  <div class="form-field"><label>メールアドレス</label><input type="email" id="l-email" placeholder="example@farm.com" autocomplete="email" inputmode="email"/></div>
  <div class="form-field"><label>パスワード</label><input type="password" id="l-pass" placeholder="パスワード" autocomplete="current-password"/></div>

  <button class="btn btn-green" id="l-btn" onclick="doLogin()">ログイン</button>
</div></div>

  <div class="topbar">
    <div style="display:flex;align-items:center;gap:8px"><div id="u-topname" style="font-size:16px;font-weight:700"></div><span class="badge badge-sync" id="u-sync" style="display:none">同期中</span></div>

    <div class="balance-hero"><div class="balance-label">ボロ残高</div><div class="balance-num" id="u-balance">0</div><div class="balance-unit">ボロ</div></div>
    <div class="card"><div class="sec-hd">入出金履歴</div><div id="u-txns"><div class="loading">読み込み中...</div></div></div>
  </div>
  <div id="u-tab-profile" class="body" style="display:none">

  <div class="tab-bar">

<div class="screen" id="s-admin">
  <div class="topbar">

    <button class="btn btn-ghost" onclick="doLogout()">ログアウト</button>
  </div>
  <div id="a-tab-members" class="body"><div class="sec-hd" id="a-count-hd">会員一覧</div><div class="card" style="padding:4px 18px"><div id="member-list"><div class="loading">読み込み中...</div></div></div></div>
  <div id="a-tab-add" class="body" style="display:none">
    <div class="sec-hd">新しい会員を追加</div><div class="card">
      <div class="form-field"><label>氏名</label><input type="text" id="n-name" placeholder="田中 花子"/></div>
      <div class="form-field"><label>メールアドレス</label><input type="email" id="n-email" placeholder="hanako@example.com" inputmode="email"/></div>

    <div class="sheet-btns"><button class="btn" style="flex:0 0 90px" onclick="closeTxnSheet()">キャンセル</button><button class="btn btn-green" id="sh-exec" style="flex:1" onclick="doTransaction()">実行する</button></div>

</div>
<div class="overlay" id="mail-overlay" onclick="if(event.target===this)closeMailSheet()">
  <div class="sheet"><div class="sheet-handle"></div><div class="sheet-title">登録完了メールを送る</div>

    <div class="cred-box" id="mail-preview"></div><div id="mail-btns" style="margin-bottom:10px"></div>

</div>

    <div class="sheet-btns"><button class="btn" style="flex:1" onclick="closeDelSheet()">キャンセル</button><button class="btn btn-red" style="flex:1" onclick="execDeleteMember()">削除する</button></div>

</div>
<div class="confirm-bg" id="confirm-bg">

    <div class="confirm-btns"><button class="btn" style="flex:1" onclick="closeConfirm()">キャンセル</button><button class="btn btn-red" style="flex:1" onclick="execDeleteAccount()">削除する</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
// ==================================================
// 設定値（変更不要）
// ==================================================
const PROJECT  = "boro-passbook";
const API_KEY  = "AIzaSyBWH4iQo3R91RZrU6TuDF99wfZVuVWeTvc";
const FS_BASE  = "https://firestore.googleapis.com/v1/projects/"+PROJECT+"/databases/(default)/documents";
const APP_URL        = "https://horsemadelandscape.github.io/boro-passbook/";
const ADMIN_EMAIL    = "admin@farm.com";
const ADMIN_PASSWORD = "admin1234";
// ==================================================

function encKey(e){return e.replace(/\./g,"__").replace(/@/g,"_AT_")}
function decKey(k){return k.replace(/__/g,".").replace(/_AT_/g,"@")}

// Firestoreの型付きフィールドをプレーンなオブジェクトに変換
function fromFS(doc){
  if(!doc||!doc.fields)return null;
  const o={};
  for(const[k,v]of Object.entries(doc.fields)){
    if("stringValue"in v)o[k]=v.stringValue;
    else if("integerValue"in v)o[k]=parseInt(v.integerValue);
    else if("booleanValue"in v)o[k]=v.booleanValue;
    else if("doubleValue"in v)o[k]=v.doubleValue;
  }
  return o;
}
// プレーンなオブジェクトをFirestoreの型付きフィールドに変換
function toFS(obj){
  const fields={};
  for(const[k,v]of Object.entries(obj)){
    if(typeof v==="string")fields[k]={stringValue:v};
    else if(typeof v==="boolean")fields[k]={booleanValue:v};
    else if(Number.isInteger(v))fields[k]={integerValue:String(v)};
    else if(typeof v==="number")fields[k]={doubleValue:v};
  }
  return{fields};
}

async function fsGet(col,id){
  const r=await fetch(FS_BASE+"/"+col+"/"+id+"?key="+API_KEY);
  if(r.status===404)return null;
  if(!r.ok)throw new Error("GET "+r.status+": "+await r.text());
  return fromFS(await r.json());
}
async function fsSet(col,id,data){
  const mask=Object.keys(data).map(f=>"updateMask.fieldPaths="+encodeURIComponent(f)).join("&");
  const r=await fetch(FS_BASE+"/"+col+"/"+id+"?"+mask+"&key="+API_KEY,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(toFS(data))});
  if(!r.ok)throw new Error("SET "+r.status+": "+await r.text());
  return fromFS(await r.json());
}
async function fsDel(col,id){
  const r=await fetch(FS_BASE+"/"+col+"/"+id+"?key="+API_KEY,{method:"DELETE"});
  if(!r.ok&&r.status!==404)throw new Error("DEL "+r.status);
}
async function fsList(col){
  const r=await fetch(FS_BASE+"/"+col+"?key="+API_KEY);
  if(!r.ok)throw new Error("LIST "+r.status+": "+await r.text());
  const d=await r.json();
  if(!d.documents)return[];
  return d.documents.map(doc=>({id:doc.name.split("/").pop(),...fromFS(doc)}));
}
async function fsQuery(col,field,value){
  const body={structuredQuery:{from:[{collectionId:col}],where:{fieldFilter:{field:{fieldPath:field},op:"EQUAL",value:{stringValue:value}}},orderBy:[{field:{fieldPath:"ts"},direction:"ASCENDING"}]}};
  const url=FS_BASE.replace("/documents","")+":runQuery?key="+API_KEY;
  const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok)throw new Error("QUERY "+r.status);
  const results=await r.json();
  return results.filter(x=>x.document).map(x=>({id:x.document.name.split("/").pop(),...fromFS(x.document)}));
}

let _polls={};
function startPoll(id,fn,ms=6000){stopPoll(id);fn();_polls[id]=setInterval(fn,ms);}
function stopPoll(id){clearInterval(_polls[id]);delete _polls[id];}
function stopAllPolls(){Object.keys(_polls).forEach(stopPoll);}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
function today(){const d=new Date();return d.getFullYear()+"/"+(d.getMonth()+1).toString().padStart(2,"0")+"/"+d.getDate().toString().padStart(2,"0")}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function initials(n){const p=n.trim().split(/\s+/);return p.length>=2?p[0][0]+p[1][0]:n.slice(0,2)}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2400);}
function showScreen(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}
let currentEmail=null,txnModal=null,delTarget=null;

async function ensureAdmin(){
  const existing=await fsGet("users",encKey(ADMIN_EMAIL));
  if(!existing)await fsSet("users",encKey(ADMIN_EMAIL),{name:"管理者",password:ADMIN_PASSWORD,balance:0,isAdmin:true});
}

async function doLogin(){
  const email=(document.getElementById("l-email").value||"").trim().toLowerCase();
  const pass=document.getElementById("l-pass").value||"";
  const errEl=document.getElementById("l-err");
  const btn=document.getElementById("l-btn");
  errEl.style.display="none";btn.textContent="確認中...";btn.disabled=true;
  try{
    const u=await fsGet("users",encKey(email));
    if(!u||u.password!==pass){errEl.style.display="block";errEl.textContent="メールアドレスまたはパスワードが正しくありません";return;}
    currentEmail=email;localStorage.setItem("boro_session",email);
    if(u.isAdmin)showAdmin();else showUser(email,u);
  }catch(e){errEl.style.display="block";errEl.textContent="ネットワークエラー: "+e.message;}
  finally{btn.textContent="ログイン";btn.disabled=false;}
}
document.getElementById("l-pass").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});

function doLogout(){
  stopAllPolls();currentEmail=null;localStorage.removeItem("boro_session");
  document.getElementById("l-email").value="";document.getElementById("l-pass").value="";
  document.getElementById("l-err").style.display="none";showScreen("s-login");
}

function showUser(email,u){
  document.getElementById("u-topname").textContent=u.name;
  document.getElementById("u-avatar").textContent=initials(u.name);
  document.getElementById("u-pname").textContent=u.name;
  document.getElementById("u-pemail").textContent=email;
  document.getElementById("u-balance").textContent=(u.balance||0).toLocaleString();
  showUserTab("home");showScreen("s-user");
  const key=encKey(email);
  startPoll("uBal",async()=>{
    const d=await fsGet("users",key);
    if(d)document.getElementById("u-balance").textContent=(d.balance||0).toLocaleString();
  });
  startPoll("uTxn",async()=>{
    const txns=await fsQuery("transactions","userKey",key);
    renderTxns(txns);
  });
}

function renderTxns(txns){
  const el=document.getElementById("u-txns");
  if(!txns.length){el.innerHTML='<div class="empty">履歴がありません</div>';return;}
  const sorted=[...txns].sort((a,b)=>String(a.ts||"").localeCompare(String(b.ts||"")));
  el.innerHTML=sorted.reverse().map(t=>`
    <div class="txn-item">
      <div style="flex:1;min-width:0"><div class="txn-date">${esc(t.date)}</div>${t.note?`<div class="txn-note">${esc(t.note)}</div>`:""}</div>
      <div class="txn-right"><div class="txn-amt ${t.amount>=0?"plus":"minus"}">${t.amount>=0?"+":""}${t.amount.toLocaleString()}</div><div class="txn-bal">${(t.balance||0).toLocaleString()} ボロ</div></div>
    </div>`).join("");
}

function showUserTab(tab){
  const h=tab==="home";
  document.getElementById("u-tab-home").style.display=h?"block":"none";
  document.getElementById("u-tab-profile").style.display=h?"none":"block";
  document.getElementById("utab-home").classList.toggle("active",h);
  document.getElementById("utab-profile").classList.toggle("active",!h);
}

function showAdmin(){
  showAdminTab("members");showScreen("s-admin");
  startPoll("members",async()=>{
    const all=await fsList("users");
    const members=all.filter(u=>decKey(u.id)!==ADMIN_EMAIL);
    renderMembers(members);
  });
}

function renderMembers(members){
  document.getElementById("a-count-hd").textContent="会員一覧（"+members.length+"名）";
  const el=document.getElementById("member-list");
  if(!members.length){el.innerHTML='<div class="empty">会員がいません</div>';return;}
  el.innerHTML=members.map(u=>{
    const email=decKey(u.id);
    return `<div class="member-item">
      <div class="avatar">${initials(u.name)}</div>
      <div class="member-info">
        <div class="member-name">${esc(u.name)}</div>
        <div class="member-email">${esc(email)}</div>
        <div class="member-acts">
          <button class="btn btn-sm btn-green" onclick="openTxnSheet('pay',this.dataset.e,this.dataset.n)" data-e="${email}" data-n="${u.name}">支払い</button>
          <button class="btn btn-sm btn-outline-red" style="border-width:1px" onclick="openTxnSheet('recv',this.dataset.e,this.dataset.n)" data-e="${email}" data-n="${u.name}">受取り</button>
          <button class="btn btn-sm btn-outline-red" style="border-width:1px;font-size:13px" onclick="openDelSheet(this.dataset.e,this.dataset.n)" data-e="${email}" data-n="${u.name}">削除</button>
        </div>
      </div>
      <div><div class="member-bal">${(u.balance||0).toLocaleString()}<small>ボロ</small></div></div>
    </div>`;
  }).join("");
}

function showAdminTab(tab){
  const m=tab==="members";
  document.getElementById("a-tab-members").style.display=m?"block":"none";
  document.getElementById("a-tab-add").style.display=m?"none":"block";
  document.getElementById("atab-m").classList.toggle("active",m);
  document.getElementById("atab-a").classList.toggle("active",!m);
}

function openTxnSheet(type,email,name){
  fsGet("users",encKey(email)).then(u=>{
    const bal=(u&&u.balance)||0;
    txnModal={type,email,name,bal};
    const isPay=type==="pay";
    document.getElementById("sh-title").textContent=isPay?name+" さんへ支払い":name+" さんから受取り";
    document.getElementById("sh-curbal").textContent=bal.toLocaleString()+" ボロ";
    document.getElementById("sh-amt-lbl").textContent=isPay?"支払うボロ数":"受け取るボロ数";
    const btn=document.getElementById("sh-exec");btn.className="btn "+(isPay?"btn-green":"btn-red");btn.style.flex="1";
    document.getElementById("sh-amount").value="";document.getElementById("sh-note").value="";
    document.getElementById("sh-err").style.display="none";
    document.getElementById("txn-overlay").classList.add("open");
    setTimeout(()=>document.getElementById("sh-amount").focus(),100);
  });
}
function closeTxnSheet(){document.getElementById("txn-overlay").classList.remove("open");txnModal=null;}

async function doTransaction(){
  const m=txnModal;
  const amtRaw=document.getElementById("sh-amount").value;
  const note=document.getElementById("sh-note").value.trim();
  const errEl=document.getElementById("sh-err");
  const amt=parseInt(amtRaw);
  if(!amtRaw||isNaN(amt)||amt<=0){errEl.style.display="block";errEl.textContent="1以上の数値を入力してください";return;}
  const sync=document.getElementById("a-sync");sync.style.display="inline-flex";
  const btn=document.getElementById("sh-exec");btn.disabled=true;btn.textContent="処理中...";
  try{
    const key=encKey(m.email);
    const u=await fsGet("users",key);
    const curBal=(u&&u.balance)||0;
    const delta=m.type==="pay"?amt:-amt;
    const newBal=curBal+delta;
    if(newBal<0){errEl.style.display="block";errEl.textContent="残高不足（現在: "+curBal+" ボロ）";return;}
    const ts=Date.now().toString();
    await fsSet("users",key,{balance:newBal});
    await fsSet("transactions",key+"_"+ts,{userKey:key,ts,date:today(),amount:delta,note,balance:newBal});
    closeTxnSheet();
    toast(m.type==="pay"?m.name+"さんへ "+amt+"ボロ 支払いました":m.name+"さんから "+amt+"ボロ 受け取りました");
  }catch(e){errEl.style.display="block";errEl.textContent="エラー: "+e.message;}
  finally{sync.style.display="none";btn.disabled=false;btn.textContent="実行する";}
}

async function doAddMember(){
  const name=document.getElementById("n-name").value.trim();
  const email=document.getElementById("n-email").value.trim().toLowerCase();
  const pass=document.getElementById("n-pass").value.trim();
  const bal=parseInt(document.getElementById("n-bal").value)||0;
  const errEl=document.getElementById("a-add-err");errEl.style.display="none";
  if(!name||!email||!pass){errEl.style.display="block";errEl.textContent="氏名・メール・パスワードは必須です";return;}
  if(!/^[^@]+@[^@]+\.[^@]+$/.test(email)){errEl.style.display="block";errEl.textContent="有効なメールアドレスを入力してください";return;}
  const btn=document.querySelector("#a-tab-add .btn-green");btn.disabled=true;btn.textContent="登録中...";
  try{
    const existing=await fsGet("users",encKey(email));
    if(existing){errEl.style.display="block";errEl.textContent="そのメールアドレスは既に登録されています";return;}
    const all=await fsList("users");
    if(all.filter(u=>decKey(u.id)!==ADMIN_EMAIL).length>=30){errEl.style.display="block";errEl.textContent="会員数の上限（30名）に達しています";return;}
    await fsSet("users",encKey(email),{name,password:pass,balance:bal,isAdmin:false});
    if(bal>0){const ts=Date.now().toString();await fsSet("transactions",encKey(email)+"_"+ts,{userKey:encKey(email),ts,date:today(),amount:bal,note:"初期残高",balance:bal});}
    ["n-name","n-email","n-pass"].forEach(id=>document.getElementById(id).value="");
    document.getElementById("n-bal").value="0";
    openMailSheet(name,email,pass,bal);
  }catch(e){errEl.style.display="block";errEl.textContent="エラー: "+e.message;}
  finally{btn.disabled=false;btn.textContent="追加＆登録メールを作成";}
}

function openMailSheet(name,email,pass,bal){
  const sub=encodeURIComponent("【ボロ通帳】アカウント登録完了のお知らせ");
  const bodyLines=["こんにちは、"+name+"さん。","","農園通貨「ボロ」の通帳システムへ登録されました。","以下の情報でログインしてください。","","---","アプリ URL: "+APP_URL,"メールアドレス: "+email,"パスワード: "+pass,"初期残高: "+bal+"ボロ","---","","ログイン後、パスワードの変更をお將めします。","どうぞよろしくお願いいたします。"];
  const body=bodyLines.join("\n");
  const enc=encodeURIComponent(body);
  const mailto="mailto:"+encodeURIComponent(email)+"?subject="+sub+"&body="+enc;
  const gmail="https://mail.google.com/mail/?view=cm&fs=1&to="+encodeURIComponent(email)+"&su="+sub+"&body="+enc;
  const gmailApp="googlegmail:///co?to="+encodeURIComponent(email)+"&subject="+sub+"&body="+enc;
  document.getElementById("mail-preview").innerHTML="<strong>宛先:</strong> "+esc(email)+"<br><strong>氏名:</strong> "+esc(name)+"<br><strong>パスワード:</strong> "+esc(pass)+"<br><strong>初期残高:</strong> "+bal+"ボロ";
  const btns=document.getElementById("mail-btns");btns.innerHTML="";
  function mkBtn(href,bg,text,target){
    const a=document.createElement("a");a.href=href;a.style.cssText="display:flex;align-items:center;justify-content:center;padding:14px;border-radius:var(--rs);font-size:15px;font-weight:500;text-decoration:none;color:#fff;background:"+bg+";margin-bottom:10px";
    a.textContent=text;if(target)a.target=target;btns.appendChild(a);
  }
  mkBtn(gmailApp,"#EA4335","📱 Gmailアプリで送る（スマホ）","");
  mkBtn(gmail,"#c0392b","🌐 ブラウザのGmailで送る","_blank");
  const a3=document.createElement("a");a3.href=mailto;a3.style.cssText="display:flex;align-items:center;justify-content:center;padding:14px;border-radius:var(--rs);font-size:14px;font-weight:500;text-decoration:none;color:var(--text2);background:var(--card);border:1px solid var(--border)";a3.textContent="📧 デフォルトのメールアプリ";btns.appendChild(a3);
  document.getElementById("mail-overlay").classList.add("open");
  showAdminTab("members");
}
function closeMailSheet(){document.getElementById("mail-overlay").classList.remove("open");}

function openDelSheet(email,name){
  delTarget={email,name};
  document.getElementById("del-msg").textContent=name+"さん（"+email+"）のアカウントを削除します。残高・履歴はすべて失われます。この操作は取り消せません。";
  document.getElementById("del-overlay").classList.add("open");
}
function closeDelSheet(){document.getElementById("del-overlay").classList.remove("open");delTarget=null;}
async function execDeleteMember(){
  if(!delTarget)return;
  const{email,name}=delTarget;
  try{
    await fsDel("users",encKey(email));
    const txns=await fsQuery("transactions","userKey",encKey(email));
    for(const t of txns)await fsDel("transactions",t.id);
    closeDelSheet();toast(name+"さんのアカウントを削除しました");
  }catch(e){toast("削除エラー: "+e.message);}
}

async function doChangePassword(){
  const cur=document.getElementById("pw-cur").value;
  const nw=document.getElementById("pw-new").value;
  const cf=document.getElementById("pw-cf").value;
  const errEl=document.getElementById("pw-err");errEl.style.display="none";
  if(!cur||!nw||!cf){errEl.style.display="block";errEl.textContent="すべての項目を入力してください";return;}
  if(nw.length<6){errEl.style.display="block";errEl.textContent="新しいパスワードは6文字以上にしてください";return;}
  if(nw!==cf){errEl.style.display="block";errEl.textContent="新しいパスワードが一致しません";return;}
  const u=await fsGet("users",encKey(currentEmail));
  if(!u||u.password!==cur){errEl.style.display="block";errEl.textContent="現在のパスワードが正しくありません";return;}
  await fsSet("users",encKey(currentEmail),{password:nw});
  ["pw-cur","pw-new","pw-cf"].forEach(id=>document.getElementById(id).value="");
  toast("パスワードを変更しました");
}

function confirmDeleteAccount(){document.getElementById("confirm-bg").classList.add("open");}
function closeConfirm(){document.getElementById("confirm-bg").classList.remove("open");}
async function execDeleteAccount(){
  if(!currentEmail)return;
  try{
    const txns=await fsQuery("transactions","userKey",encKey(currentEmail));
    for(const t of txns)await fsDel("transactions",t.id);
    await fsDel("users",encKey(currentEmail));
    closeConfirm();doLogout();toast("アカウントを削除しました");
  }catch(e){toast("エラー: "+e.message);}
}

(async()=>{
  try{
    await ensureAdmin();
    const saved=localStorage.getItem("boro_session");
    if(saved){
      const u=await fsGet("users",encKey(saved));
      if(u){currentEmail=saved;if(u.isAdmin)showAdmin();else showUser(saved,u);}
      else localStorage.removeItem("boro_session");
    }
  }catch(e){console.error("起動エラー:",e.message);}
})();
</script>
